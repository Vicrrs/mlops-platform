# Step template: instala a versão de Python solicitada e cria/ativa um cache de pip.
parameters:
  - name: pythonVersion
    type: string
    default: "3.11"

steps:
  - task: UsePythonVersion@0
    displayName: "Instalar Python ${{ parameters.pythonVersion }}"
    inputs:
      versionSpec: "${{ parameters.pythonVersion }}"
      addToPath: true

  - bash: |
      set -euo pipefail
      echo "##vso[task.setvariable variable=PIP_CACHE_DIR]$(Pipeline.Workspace)/.pip-cache"
    displayName: "Definir diretório de cache do pip"

  - task: Cache@2
    displayName: "Cache pip"
    inputs:
      key: 'python | "${{ parameters.pythonVersion }}" | pyproject.toml'
      restoreKeys: |
        python | "${{ parameters.pythonVersion }}"
      path: $(PIP_CACHE_DIR)
    condition: succeededOrFailed()

  - bash: |
      set -euo pipefail
      python -m pip install --upgrade pip setuptools wheel
    displayName: "Bootstrap pip"
