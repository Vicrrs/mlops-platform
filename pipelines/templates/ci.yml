# Stages template: CI básica de qualquer projeto consumidor -- validação de
# estrutura, lint e testes unitários (sempre), e security scan (opcional).
# Incluído por ml-project-pipeline.yml na raiz de `stages:`.
parameters:
  - name: pythonVersion
    type: string
    default: "3.11"
  - name: packageName
    type: string
  - name: runSecurityScan
    type: boolean
    default: true

stages:
  - stage: ValidateProject
    displayName: "Validar estrutura do projeto"
    jobs:
      - job: ValidateProject
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
          - checkout: mlops
          - template: /pipelines/steps/install-python.yml@mlops
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}
          - template: /pipelines/steps/validate-structure.yml@mlops

  - stage: Lint
    displayName: "Lint"
    dependsOn: ValidateProject
    jobs:
      - job: Lint
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
          - checkout: mlops
          - template: /pipelines/steps/install-python.yml@mlops
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}
          - template: /pipelines/steps/install-project.yml@mlops
          - template: /pipelines/steps/run-lint.yml@mlops

  - stage: UnitTests
    displayName: "Testes unitários"
    dependsOn: ValidateProject
    jobs:
      - job: UnitTests
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
          - checkout: mlops
          - template: /pipelines/steps/install-python.yml@mlops
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}
          - template: /pipelines/steps/install-project.yml@mlops
          - template: /pipelines/steps/run-unit-tests.yml@mlops
            parameters:
              packageName: ${{ parameters.packageName }}
          - template: /pipelines/steps/publish-test-results.yml@mlops
            parameters:
              coverageReportPath: "$(Build.ArtifactStagingDirectory)/coverage-unit.xml"

  - ${{ if eq(parameters.runSecurityScan, true) }}:
      - stage: SecurityScan
        displayName: "Security scan"
        dependsOn: ValidateProject
        jobs:
          - job: SecurityScan
            pool:
              vmImage: "ubuntu-latest"
            steps:
              - checkout: self
              - template: /pipelines/steps/install-python.yml@mlops
                parameters:
                  pythonVersion: ${{ parameters.pythonVersion }}
              - bash: |
                  set -euo pipefail
                  python -m pip install pip-audit
                  pip-audit -r <(python -m pip freeze) || {
                    echo "##vso[task.logissue type=warning]pip-audit encontrou vulnerabilidades -- revisar antes de promover para PRD.";
                  }
                displayName: "pip-audit (dependências Python)"
