# Job Databricks: EDA automatizada sobre o dataset bruto, artefatos registrados no MLflow.
# Lógica real em churn_model.data.eda, chamada via churn_model.cli.run_eda.
resources:
  jobs:
    eda_job:
      name: "ml-churn-eda-${bundle.target}"
      tags:
        project: ml-churn
        environment: ${var.environment}
        managed_by: mlops-platform
      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: ${var.min_workers}
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: run_eda
          job_cluster_key: main
          python_wheel_task:
            package_name: churn_model
            entry_point: churn-run-eda
            parameters:
              - "--config"
              - "conf/${var.environment}.yml"
              - "--output-dir"
              - "artifacts/eda"
          libraries:
            - whl: ../dist/*.whl
      email_notifications:
        on_failure:
          - mlops-alerts@empresa.com
      max_concurrent_runs: 1
